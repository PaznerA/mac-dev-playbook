---
# ==============================================================================
# DNSMASQ – automatický DNS resolver pro *.instance_tld (default: dev.local)
# Odstraňuje nutnost ručně editovat /etc/hosts
#
# Jak to funguje:
#   1. dnsmasq naslouchá na 127.0.0.1:53
#   2. macOS /etc/resolver/<instance_tld> přesměruje *.<instance_tld> dotazy na dnsmasq
#   3. dnsmasq odpoví 127.0.0.1 pro všechny *.<instance_tld> domény
#
# Výsledek: grafana.<instance_tld>, gitea.<instance_tld>, n8n.<instance_tld>... fungují
# automaticky bez jakékoliv ruční konfigurace.
# ==============================================================================

- name: Install dnsmasq via Homebrew
  community.general.homebrew:
    name: dnsmasq
    state: present

- name: "[dnsmasq] Detect LAN IP for DNS responses"
  ansible.builtin.shell: ipconfig getifaddr en0 2>/dev/null || echo "127.0.0.1"
  register: _lan_ip
  changed_when: false
  check_mode: false
  when: dnsmasq_lan_access | default(true)

- name: "[dnsmasq] Build listen addresses"
  ansible.builtin.set_fact:
    _dnsmasq_listen: "{{ '127.0.0.1,' ~ (_lan_ip.stdout | default('127.0.0.1')) if (dnsmasq_lan_access | default(true)) else '127.0.0.1' }}"
    _dnsmasq_target: "{{ _lan_ip.stdout | default(dnsmasq_dev_address | default('127.0.0.1')) }}"

- name: Deploy dnsmasq configuration
  ansible.builtin.blockinfile:
    path: "{{ homebrew_prefix }}/etc/dnsmasq.conf"
    marker: "# {mark} {{ (dnsmasq_dev_domain | default(instance_tld)) | upper }} (ansible managed)"
    block: |
      # *.{{ dnsmasq_dev_domain }} → {{ _dnsmasq_target }} (LAN IP)
      address=/.{{ dnsmasq_dev_domain | default(instance_tld) }}/{{ _dnsmasq_target }}

      # Volitelné vlastní záznamy
      {% for entry in dnsmasq_additional_addresses | default([]) %}
      address=/{{ entry.domain }}/{{ entry.address }}
      {% endfor %}

      # Rozhraní: {{ _dnsmasq_listen }}
      listen-address={{ _dnsmasq_listen }}
      bind-interfaces

      # Nezasílat dotazy s .{{ dnsmasq_dev_domain }} na upstream DNS
      local=/{{ dnsmasq_dev_domain | default(instance_tld) }}/

      # Rychlejší cache
      cache-size=1000
    create: true
    mode: '0644'
  notify: Restart dnsmasq

- name: Ensure /etc/resolver directory exists
  ansible.builtin.file:
    path: /etc/resolver
    state: directory
    mode: '0755'
  become: true
  when: not ansible_check_mode

- name: Create macOS resolver for {{ dnsmasq_dev_domain }} domain
  ansible.builtin.copy:
    dest: "/etc/resolver/{{ dnsmasq_dev_domain | default(instance_tld) }}"
    content: |
      # Vygenerováno Ansible – *.{{ dnsmasq_dev_domain | default(instance_tld) }} → dnsmasq
      nameserver 127.0.0.1
      port {{ dnsmasq_port | default(53) }}
    mode: '0644'
  become: true
  when: not ansible_check_mode

- name: Start dnsmasq via brew services (requires root for port 53)  # noqa: command-instead-of-shell
  ansible.builtin.shell: >-
    sudo -A {{ homebrew_prefix }}/bin/brew services start dnsmasq
  environment:
    SUDO_ASKPASS: "{{ lookup('env', 'HOME') }}/.ansible_askpass"
  register: dnsmasq_svc
  changed_when: "'already started' not in (dnsmasq_svc.stdout | default(''))"
  failed_when:
    - dnsmasq_svc.rc != 0
    - "'already started' not in (dnsmasq_svc.stdout | default(''))"

- name: Verify dnsmasq resolves {{ dnsmasq_dev_domain }} correctly
  ansible.builtin.command: "dig +short grafana.{{ dnsmasq_dev_domain | default(instance_tld) }} @127.0.0.1"
  register: dns_check
  changed_when: false
  failed_when: false

- name: Show DNS verification result
  ansible.builtin.debug:
    msg: "DNS check grafana.{{ dnsmasq_dev_domain | default(instance_tld) }} → {{ dns_check.stdout | default('(prázdné – dnsmasq se spouští)') }}"
