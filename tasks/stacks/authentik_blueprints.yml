---
# ==============================================================================
# Authentik Blueprints — deklarativní YAML state management
#
# Blueprinty v /blueprints/custom/ jsou auto-discovered Authentikem a reconciled
# při každém startu + na změnu souboru (inotify). Blueprint engine re-aplikuje
# `password` pole na `authentik_core.user` na každý reconcile cycle → drift
# prefixu se projeví do existujícího akadmin usera bez DB DROP.
#
# Volá se z core-up.yml PŘED `docker compose up infra --wait`, aby bind source
# /blueprints/custom existoval dřív než Docker vytvoří mount point.
# ==============================================================================

- name: "[Authentik Blueprints] Ensure directory"
  ansible.builtin.file:
    path: "{{ stacks_dir }}/infra/authentik/blueprints"
    state: directory
    mode: '0755'

- name: "[Authentik Blueprints] Render admin + groups"
  ansible.builtin.template:
    src: "authentik/blueprints/00-admin-groups.yaml.j2"
    dest: "{{ stacks_dir }}/infra/authentik/blueprints/00-admin-groups.yaml"
    mode: '0640'
  notify: Reapply authentik blueprints

- name: "[Authentik Blueprints] Render OAuth2 / proxy providers + applications"
  ansible.builtin.template:
    src: "authentik/blueprints/10-oidc-apps.yaml.j2"
    dest: "{{ stacks_dir }}/infra/authentik/blueprints/10-oidc-apps.yaml"
    mode: '0640'
  notify: Reapply authentik blueprints

- name: "[Authentik Blueprints] Render RBAC expression policies + bindings"
  ansible.builtin.template:
    src: "authentik/blueprints/20-rbac-policies.yaml.j2"
    dest: "{{ stacks_dir }}/infra/authentik/blueprints/20-rbac-policies.yaml"
    mode: '0640'
  notify: Reapply authentik blueprints
