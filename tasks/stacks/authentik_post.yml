---
# ==============================================================================
# Authentik post-start: počkat na ready + info
# Bootstrap admin se vytvoří automaticky přes AUTHENTIK_BOOTSTRAP_* env vars
# ==============================================================================

- name: "[Authentik] Wait for server to be ready"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ authentik_port | default(9000) }}/-/health/ready/"
    status_code: [200, 204]
    timeout: 10
  register: _authentik_health
  retries: 30
  delay: 5
  until: _authentik_health.status | default(0) in [200, 204]
  failed_when: false

- name: "[Authentik] Status"
  ansible.builtin.debug:
    msg: >-
      Authentik {{ 'OK' if _authentik_health.status | default(0) in [200, 204]
      else 'NEDOSTUPNY – docker logs infra-authentik-server-1' }}
      | Admin: https://{{ authentik_domain | default('auth.dev.local') }}/if/admin/
      | Login: akadmin / {{ authentik_bootstrap_password }}
