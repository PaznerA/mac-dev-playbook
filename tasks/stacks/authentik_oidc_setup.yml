---
# ==============================================================================
# Authentik OIDC Setup — automatické vytvoření providerů a aplikací
# Single source of truth: authentik_oidc_apps v default.config.yml
# Idempotentní — kontroluje existenci před vytvořením
# ==============================================================================

# ── 1. API Token (via Django shell — ak create_token neexistuje v 2025.2) ────

- name: "[Authentik OIDC] Create API token via Django shell"
  ansible.builtin.shell: >
    {{ docker_bin }} exec infra-authentik-server-1
    ak shell -c
    "from authentik.core.models import Token,User;
    u=User.objects.filter(username='akadmin').first();
    t,_=Token.objects.get_or_create(identifier='devboxnos-api',defaults={'user':u,'intent':'api','expiring':False});
    print(t.key)"
    2>/dev/null | tail -1
  register: _ak_token_raw
  changed_when: false
  failed_when: false

- name: "[Authentik OIDC] Validate token"
  ansible.builtin.set_fact:
    _ak_token: "{{ _ak_token_raw.stdout | default('') | trim }}"
    _ak_base: "http://127.0.0.1:{{ authentik_port | default(9003) }}"

- name: "[Authentik OIDC] Token status"
  ansible.builtin.debug:
    msg: "{{ 'OK — token získán' if (_ak_token | length >= 10) else 'CHYBA — token nenalezen, OIDC setup přeskočen' }}"

# ── 1b. RBAC skupiny (providers, admins, managers, users, guests) ────────────

- name: "[Authentik OIDC] List existing groups"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/groups/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_groups_resp
  failed_when: false
  when: _ak_token | length >= 10

- name: "[Authentik OIDC] Create default RBAC groups"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/groups/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      is_superuser: "{{ item.name == 'devboxnos-providers' or item.name == 'devboxnos-admins' }}"
    status_code: [200, 201]
  loop: "{{ authentik_default_groups | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - _ak_groups_resp.json is defined
    - item.name not in (_ak_groups_resp.json.results | default([]) | map(attribute='name') | list)
  failed_when: false

- name: "[Authentik OIDC] Refresh group list after creation"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/groups/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_groups_resp
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Add akadmin to devboxnos-admins group"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/users/?search=akadmin"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_akadmin_user
  when:
    - _ak_token | length >= 10
    - _ak_groups_resp.json is defined
  failed_when: false

- name: "[Authentik OIDC] Assign akadmin to admins group"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/users/{{ (_ak_akadmin_user.json.results | first).pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      groups: "{{ (_ak_akadmin_user.json.results | first).groups | default([]) | union(_ak_groups_resp.json.results | selectattr('name', 'equalto', 'devboxnos-admins') | map(attribute='pk') | list) }}"
    status_code: [200]
  when:
    - _ak_token | length >= 10
    - _ak_akadmin_user.json.results | default([]) | length > 0
    - _ak_groups_resp.json.results | selectattr('name', 'equalto', 'devboxnos-admins') | list | length > 0
  failed_when: false

- name: "[Authentik OIDC] Add provider admin to providers group"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/users/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      username: "provider-admin"
      name: "Provider Admin"
      email: "{{ provider_admin_email | default('') }}"
      path: "providers"
      groups: "{{ _ak_groups_resp.json.results | default([]) | selectattr('name', 'equalto', 'devboxnos-providers') | map(attribute='pk') | list }}"
    status_code: [200, 201, 400]
  when:
    - _ak_token | length >= 10
    - provider_admin_email | default('') | length > 0
    - _ak_groups_resp.json is defined
  failed_when: false

# ── 2. Flows ─────────────────────────────────────────────────────────────────

- name: "[Authentik OIDC] Get authorization flow"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/flows/instances/?designation=authorization&ordering=slug"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_auth_flow_resp
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Get invalidation flow"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/flows/instances/?designation=invalidation&ordering=slug"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_inv_flow_resp
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Set flow PKs"
  ansible.builtin.set_fact:
    _ak_auth_flow_pk: "{{ (_ak_auth_flow_resp.json.results | default([]))[0].pk | default('') }}"
    _ak_inv_flow_pk: "{{ (_ak_inv_flow_resp.json.results | default([]))[0].pk | default('') }}"
  when: _ak_token | length >= 10

# ── 2b. Scope mappings (email, profile, openid) ─────────────────────────────

- name: "[Authentik OIDC] Get OIDC scope mappings"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/propertymappings/all/?managed__icontains=oauth2/scope&page_size=50"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_scope_mappings_resp
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Set scope mapping PKs"
  ansible.builtin.set_fact:
    _ak_scope_pks: "{{ _ak_scope_mappings_resp.json.results | default([]) | map(attribute='pk') | list }}"
  when: _ak_scope_mappings_resp is defined and _ak_scope_mappings_resp.status | default(0) == 200

# ── 3. Existing providers (idempotence) ──────────────────────────────────────

- name: "[Authentik OIDC] List existing OAuth2 providers"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/oauth2/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_existing_providers
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] List existing proxy providers"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/proxy/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_existing_proxy
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] List existing applications"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/applications/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_existing_apps
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Build existing name/slug lists"
  ansible.builtin.set_fact:
    _ak_existing_provider_names: "{{ _ak_existing_providers.json.results | default([]) | map(attribute='name') | list }}"
    _ak_existing_proxy_names: "{{ _ak_existing_proxy.json.results | default([]) | map(attribute='name') | list }}"
    _ak_existing_app_slugs: "{{ _ak_existing_apps.json.results | default([]) | map(attribute='slug') | list }}"
  when: _ak_token | length >= 10

# ── 4. Split apps: OAuth2 vs Proxy ──────────────────────────────────────────

- name: "[Authentik OIDC] Build active app lists"
  ansible.builtin.set_fact:
    _ak_oauth_apps: "{{ authentik_oidc_apps | default([]) | selectattr('enabled', 'equalto', true) | rejectattr('type', 'defined') | list + authentik_oidc_apps | default([]) | selectattr('enabled', 'equalto', true) | selectattr('type', 'defined') | rejectattr('type', 'equalto', 'proxy') | list }}"
    _ak_proxy_apps: "{{ authentik_oidc_apps | default([]) | selectattr('enabled', 'equalto', true) | selectattr('type', 'defined') | selectattr('type', 'equalto', 'proxy') | list }}"

# ── 5. Create OAuth2 providers ───────────────────────────────────────────────

- name: "[Authentik OIDC] Create OAuth2 providers"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/oauth2/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      authorization_flow: "{{ _ak_auth_flow_pk }}"
      invalidation_flow: "{{ _ak_inv_flow_pk }}"
      client_type: "confidential"
      client_id: "{{ item.client_id }}"
      client_secret: "{{ item.client_secret }}"
      redirect_uris:
        - matching_mode: "strict"
          url: "{{ item.redirect_uris }}"
      property_mappings: "{{ _ak_scope_pks | default([]) }}"
      sub_mode: "hashed_user_id"
    status_code: [200, 201]
  loop: "{{ _ak_oauth_apps }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - _ak_auth_flow_pk | default('') | length > 0
    - item.name not in (_ak_existing_provider_names | default([]))
  register: _ak_created_providers
  failed_when: false

# ── 6. Create proxy providers ────────────────────────────────────────────────

- name: "[Authentik OIDC] Create proxy providers"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/proxy/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      authorization_flow: "{{ _ak_auth_flow_pk }}"
      invalidation_flow: "{{ _ak_inv_flow_pk }}"
      external_host: "{{ item.external_host }}"
      mode: "forward_single"
    status_code: [200, 201]
  loop: "{{ _ak_proxy_apps | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - _ak_auth_flow_pk | default('') | length > 0
    - item.name not in (_ak_existing_proxy_names | default([]))
  register: _ak_created_proxy
  failed_when: false

# ── 7. Refresh all providers for app linking ─────────────────────────────────

- name: "[Authentik OIDC] Refresh OAuth2 provider list"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/oauth2/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_all_oauth
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Refresh proxy provider list"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/proxy/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_all_proxy
  when: _ak_token | length >= 10
  failed_when: false

# ── 8. Create applications ───────────────────────────────────────────────────

- name: "[Authentik OIDC] Create OAuth2 applications"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      slug: "{{ item.slug }}"
      provider: "{{ (_ak_all_oauth.json.results | default([]) | selectattr('name', 'equalto', item.name) | first).pk | default(omit) }}"
      meta_launch_url: "{{ item.launch_url }}"
    status_code: [200, 201]
  loop: "{{ _ak_oauth_apps }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - item.slug not in (_ak_existing_app_slugs | default([]))
  register: _ak_created_oauth_apps
  failed_when: false

- name: "[Authentik OIDC] Create proxy applications"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      slug: "{{ item.slug }}"
      provider: "{{ (_ak_all_proxy.json.results | default([]) | selectattr('name', 'equalto', item.name) | first).pk | default(omit) }}"
      meta_launch_url: "{{ item.launch_url }}"
    status_code: [200, 201]
  loop: "{{ _ak_proxy_apps | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - item.slug not in (_ak_existing_app_slugs | default([]))
  register: _ak_created_proxy_apps
  failed_when: false

# ── 8b. RBAC: Create expression policies per tier ────────────────────────────

- name: "[Authentik RBAC] Refresh group list for policy creation"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/groups/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_groups_fresh
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik RBAC] List existing policies"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/policies/expression/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_existing_policies
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik RBAC] Create tier expression policies"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/policies/expression/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "devboxnos-{{ item.name }}"
      expression: "return request.user.is_superuser or any(g.name in {{ item.groups | to_json }} for g in request.user.ak_groups.all())"
      execution_logging: false
    status_code: [200, 201]
  loop: "{{ authentik_rbac_tiers | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - "'devboxnos-' ~ item.name not in (_ak_existing_policies.json.results | default([]) | map(attribute='name') | list)"
  register: _ak_created_policies
  failed_when: false

- name: "[Authentik RBAC] Update existing tier policies (ensure superuser bypass)"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/policies/expression/{{ (_ak_existing_policies.json.results | selectattr('name', 'equalto', 'devboxnos-' ~ item.name) | first).pk }}/"
    method: PUT
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "devboxnos-{{ item.name }}"
      expression: "return request.user.is_superuser or any(g.name in {{ item.groups | to_json }} for g in request.user.ak_groups.all())"
      execution_logging: false
    status_code: [200]
  loop: "{{ authentik_rbac_tiers | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - "'devboxnos-' ~ item.name in (_ak_existing_policies.json.results | default([]) | map(attribute='name') | list)"
  failed_when: false

# ── 8c. RBAC: Bind policies to applications ──────────────────────────────────

- name: "[Authentik RBAC] Refresh policy list"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/policies/expression/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_all_policies
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik RBAC] Refresh application list for binding"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/applications/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_all_apps_rbac
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik RBAC] List existing policy bindings"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/policies/bindings/?page_size=200"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_existing_bindings
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik RBAC] Bind tier policies to applications"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/policies/bindings/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      policy: "{{ _policy_pk }}"
      target: "{{ _app_pk }}"
      negate: false
      enabled: true
      order: 0
      timeout: 30
    status_code: [200, 201]
  loop: "{{ ((_ak_oauth_apps | default([])) + (_ak_proxy_apps | default([]))) }}"
  loop_control:
    label: "{{ item.slug }} → tier {{ _app_tier }}"
  vars:
    _app_tier: "{{ authentik_app_tiers[item.slug] | default(3) }}"
    _tier_name: "{{ (authentik_rbac_tiers | selectattr('tier', 'equalto', _app_tier | int) | list | first | default({'name': 'tier-user'})).name }}"
    _app_pk: "{{ (_ak_all_apps_rbac.json.results | default([]) | selectattr('slug', 'equalto', item.slug) | list | first | default({})).pk | default('') }}"
    _policy_pk: "{{ (_ak_all_policies.json.results | default([]) | selectattr('name', 'equalto', 'devboxnos-' ~ _tier_name) | list | first | default({})).pk | default('') }}"
    _existing_binding_targets: "{{ _ak_existing_bindings.json.results | default([]) | map(attribute='target') | list }}"
  when:
    - _ak_token | length >= 10
    - _app_pk | length > 0
    - _policy_pk | length > 0
    - _app_pk not in _existing_binding_targets
  failed_when: false

- name: "[Authentik RBAC] Summary"
  ansible.builtin.debug:
    msg: >-
      RBAC: {{ authentik_rbac_tiers | default([]) | length }} tier policies,
      {{ ((_ak_oauth_apps | default([])) + (_ak_proxy_apps | default([]))) | length }} apps bound
  when: _ak_token | length >= 10

# ── 9. Assign proxy providers to embedded outpost ───────────────────────────

- name: "[Authentik OIDC] Get embedded outpost"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/outposts/instances/?managed=goauthentik.io/outposts/embedded"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_outpost_resp
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Assign proxy providers to embedded outpost"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/outposts/instances/{{ (_ak_outpost_resp.json.results | first).pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      providers: "{{ _ak_all_proxy.json.results | default([]) | map(attribute='pk') | list }}"
      config:
        authentik_host: "https://{{ authentik_domain | default('auth.dev.local') }}"
        authentik_host_browser: "https://{{ authentik_domain | default('auth.dev.local') }}"
    status_code: [200]
  when:
    - _ak_token | length >= 10
    - _ak_outpost_resp.json.results | default([]) | length > 0
    - _ak_all_proxy.json.results | default([]) | length > 0
  failed_when: false

# ── 10. Summary ──────────────────────────────────────────────────────────────

- name: "[Authentik OIDC] Summary"
  ansible.builtin.debug:
    msg: >-
      OIDC: {{ (_ak_oauth_apps | default([])) | length }} OAuth2 +
      {{ (_ak_proxy_apps | default([])) | length }} proxy apps configured
  when: _ak_token | length >= 10
