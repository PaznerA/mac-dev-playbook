---
# ==============================================================================
# POSTGRESQL – post-start: vytvoří databáze a uživatele
# Běží PO startu infra stacku (stack-up.yml --wait).
# ==============================================================================

- name: "[PostgreSQL] Verify PostgreSQL is accepting connections"
  ansible.builtin.command: >
    {{ docker_bin }} compose -p infra
    exec -T postgresql pg_isready -U {{ postgresql_root_user | default('postgres') }}
  register: _pg_ready
  retries: 18
  delay: 5
  until: _pg_ready.rc == 0
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: "[PostgreSQL] Create databases"
  ansible.builtin.command: >
    {{ docker_bin }} compose -p infra
    exec -T postgresql psql -U {{ postgresql_root_user | default('postgres') }}
    -c "CREATE DATABASE {{ item }};"
  loop:
    - outline
    - metabase
    - superset
  loop_control:
    label: "DB: {{ item }}"
  register: _pg_db
  changed_when: _pg_db.rc == 0
  failed_when: false
  when:
    - _pg_ready.rc | default(1) == 0
    - not ansible_check_mode

- name: "[PostgreSQL] Create users"
  ansible.builtin.command: >
    {{ docker_bin }} compose -p infra
    exec -T postgresql psql -U {{ postgresql_root_user | default('postgres') }}
    -c "CREATE USER {{ item.user }} WITH PASSWORD '{{ item.pass }}';"
  loop:
    - { user: "{{ outline_db_user | default('outline') }}", pass: "{{ outline_db_password | default(global_password_prefix + '_pw_outline') }}" }
    - { user: "{{ metabase_db_user | default('metabase') }}", pass: "{{ metabase_db_password | default(global_password_prefix + '_pw_metabase') }}" }
    - { user: "{{ superset_db_user | default('superset') }}", pass: "{{ superset_db_password | default(global_password_prefix + '_pw_superset') }}" }
  loop_control:
    label: "USER: {{ item.user }}"
  no_log: true
  changed_when: false
  failed_when: false
  when:
    - _pg_ready.rc | default(1) == 0
    - not ansible_check_mode

- name: "[PostgreSQL] Grant privileges"
  ansible.builtin.command: >
    {{ docker_bin }} compose -p infra
    exec -T postgresql psql -U {{ postgresql_root_user | default('postgres') }}
    -c "GRANT ALL PRIVILEGES ON DATABASE {{ item.db }} TO {{ item.user }}; ALTER DATABASE {{ item.db }} OWNER TO {{ item.user }};"
  loop:
    - { db: "outline", user: "{{ outline_db_user | default('outline') }}" }
    - { db: "metabase", user: "{{ metabase_db_user | default('metabase') }}" }
    - { db: "superset", user: "{{ superset_db_user | default('superset') }}" }
  loop_control:
    label: "GRANT: {{ item.db }}"
  changed_when: false
  failed_when: false
  when:
    - _pg_ready.rc | default(1) == 0
    - not ansible_check_mode
