---
# ==============================================================================
# POSTGRESQL – post-start: vytvoří databáze a uživatele
# Běží PO startu infra stacku (stack-up.yml --wait).
# ==============================================================================

- name: "[PostgreSQL] Verify PostgreSQL is accepting connections"
  ansible.builtin.command: >
    {{ docker_bin }} compose -p infra
    exec -T postgresql pg_isready -U {{ postgresql_root_user | default('postgres') }}
  register: _pg_ready
  retries: 18
  delay: 5
  until: _pg_ready.rc == 0
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: "[PostgreSQL] Create databases"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p infra
    exec -T postgresql bash -c
    'psql -U {{ postgresql_root_user | default("postgres") }} -tc
    "SELECT 1 FROM pg_database WHERE datname = '"'"'{{ item }}'"'"'"
    | grep -q 1 || psql -U {{ postgresql_root_user | default("postgres") }}
    -c "CREATE DATABASE {{ item }}"'
  loop:
    - outline
    - metabase
    - superset
  loop_control:
    label: "DB: {{ item }}"
  changed_when: false
  failed_when: false
  when:
    - _pg_ready.rc | default(1) == 0
    - not ansible_check_mode

- name: "[PostgreSQL] Create users and grant privileges"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p infra
    exec -T postgresql psql -U {{ postgresql_root_user | default('postgres') }}
    -c "{{ item }}"
  loop:
    - "DO $$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ outline_db_user | default('outline') }}') THEN CREATE USER {{ outline_db_user | default('outline') }} WITH PASSWORD '{{ outline_db_password | default(global_password_prefix + '_pw_outline') }}'; END IF; END $$;"
    - "GRANT ALL PRIVILEGES ON DATABASE outline TO {{ outline_db_user | default('outline') }};"
    - "ALTER DATABASE outline OWNER TO {{ outline_db_user | default('outline') }};"
    - "DO $$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ metabase_db_user | default('metabase') }}') THEN CREATE USER {{ metabase_db_user | default('metabase') }} WITH PASSWORD '{{ metabase_db_password | default(global_password_prefix + '_pw_metabase') }}'; END IF; END $$;"
    - "GRANT ALL PRIVILEGES ON DATABASE metabase TO {{ metabase_db_user | default('metabase') }};"
    - "ALTER DATABASE metabase OWNER TO {{ metabase_db_user | default('metabase') }};"
    - "DO $$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ superset_db_user | default('superset') }}') THEN CREATE USER {{ superset_db_user | default('superset') }} WITH PASSWORD '{{ superset_db_password | default(global_password_prefix + '_pw_superset') }}'; END IF; END $$;"
    - "GRANT ALL PRIVILEGES ON DATABASE superset TO {{ superset_db_user | default('superset') }};"
    - "ALTER DATABASE superset OWNER TO {{ superset_db_user | default('superset') }};"
  loop_control:
    label: "SQL"
  no_log: true
  changed_when: false
  failed_when: false
  when:
    - _pg_ready.rc | default(1) == 0
    - not ansible_check_mode
