---
# ==============================================================================
# Portainer CE – Docker management UI (Docker)
#
# Připojuje se na lokální Docker socket → plná správa kontejnerů, imagí,
# volumes, sítí a logů přes browser.
# ==============================================================================

- name: "[Portainer] Ensure data and log directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ portainer_data_dir }}"
    - "{{ ansible_facts['env']['HOME'] }}/agents/log"

- name: "[Portainer] Create bcrypt admin password file"
  ansible.builtin.shell: >
    htpasswd -nbB admin "{{ portainer_admin_password | default(global_password_prefix + '_pw_portainer') }}"
    | cut -d: -f2 > "{{ portainer_data_dir }}/init_password"
  args:
    creates: "{{ portainer_data_dir }}/init_password"

- name: "[Portainer] Enable nginx vhost"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/portainer.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/portainer.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)
