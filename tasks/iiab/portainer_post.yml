---
# ==============================================================================
# PORTAINER POST-START – auto-create admin přes API
# Portainer API /api/users/admin/init vytvoří admin účet (pouze pokud neexistuje)
# ==============================================================================

- name: "[Portainer Post] Wait for API to be ready"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ portainer_port | default(9002) }}/api/status"
    method: GET
    timeout: 5
    status_code: [200]
  register: _portainer_ready
  until: _portainer_ready.status | default(0) == 200
  retries: 12
  delay: 10
  failed_when: false

- name: "[Portainer Post] Check if admin already exists"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ portainer_port | default(9002) }}/api/users/admin/check"
    method: GET
    status_code: [204, 404]
    timeout: 5
  register: _portainer_admin_check
  failed_when: false
  when: _portainer_ready.status | default(0) == 200

- name: "[Portainer Post] Create admin user via API"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ portainer_port | default(9002) }}/api/users/admin/init"
    method: POST
    body_format: json
    body:
      Username: "admin"
      Password: "{{ portainer_admin_password | default(global_password_prefix + '_pw_portainer') }}"
    status_code: [200]
    timeout: 10
  register: _portainer_admin_create
  when:
    - _portainer_ready.status | default(0) == 200
    - _portainer_admin_check.status | default(0) == 404
  changed_when: _portainer_admin_create.status | default(0) == 200
  failed_when: false

# ── Authentik OIDC přes Portainer Settings API ──────────────────────────────

- name: "[Portainer Post] Get auth token for admin"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ portainer_port | default(9002) }}/api/auth"
    method: POST
    body_format: json
    body:
      Username: "admin"
      Password: "{{ portainer_admin_password | default(global_password_prefix + '_pw_portainer') }}"
    status_code: [200]
    timeout: 10
  register: _portainer_auth
  when:
    - _portainer_ready.status | default(0) == 200
    - install_authentik | default(false)
  failed_when: false

- name: "[Portainer Post] Configure OAuth2 settings (Authentik)"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ portainer_port | default(9002) }}/api/settings"
    method: PUT
    body_format: json
    headers:
      Authorization: "Bearer {{ _portainer_auth.json.jwt | default('') }}"
    body:
      AuthenticationMethod: 3
      OAuthSettings:
        ClientID: "{{ authentik_oidc_portainer_client_id }}"
        ClientSecret: "{{ authentik_oidc_portainer_client_secret }}"
        AuthorizationURI: "https://{{ authentik_domain | default('auth.dev.local') }}/application/o/authorize/"
        AccessTokenURI: "http://infra-authentik-server-1:9000/application/o/token/"
        ResourceURI: "http://infra-authentik-server-1:9000/application/o/userinfo"
        RedirectURI: "https://{{ portainer_domain | default('portainer.dev.local') }}"
        UserIdentifier: "preferred_username"
        Scopes: "openid profile email"
        OAuthAutoCreateUsers: true
        DefaultTeamID: 0
        SSO: true
        LogoutURI: "https://{{ authentik_domain | default('auth.dev.local') }}/application/o/portainer/end-session/"
    status_code: [200]
    timeout: 10
  when:
    - _portainer_auth.json.jwt is defined
    - _portainer_auth.json.jwt | length > 0
  changed_when: true
  failed_when: false
