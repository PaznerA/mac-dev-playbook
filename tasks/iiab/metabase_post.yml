---
# ==============================================================================
# METABASE POST-START – auto-setup admin via /api/setup
# Metabase POST /api/setup creates admin + database config in one call.
# Idempotent: returns 403 if already set up.
# ==============================================================================

- name: "[Metabase Post] Wait for API"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ metabase_port | default(3002) }}/api/health"
    method: GET
    timeout: 5
    status_code: [200]
  register: _mb_ready
  until: _mb_ready.status | default(0) == 200
  retries: 20
  delay: 10
  failed_when: false

- name: "[Metabase Post] Check if setup already completed"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ metabase_port | default(3002) }}/api/session/properties"
    method: GET
    timeout: 10
    status_code: [200]
  register: _mb_props
  failed_when: false
  when: _mb_ready.status | default(0) == 200

- name: "[Metabase Post] Get setup token"
  ansible.builtin.set_fact:
    _mb_setup_token: "{{ _mb_props.json['setup-token'] | default('') }}"
  when:
    - _mb_props.json is defined

- name: "[Metabase Post] Run initial setup (admin + db config)"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ metabase_port | default(3002) }}/api/setup"
    method: POST
    body_format: json
    body:
      token: "{{ _mb_setup_token }}"
      user:
        email: "{{ metabase_admin_email | default('admin@dev.local') }}"
        password: "{{ metabase_admin_password | default('changeme_pw_metabase_admin') }}"
        first_name: "{{ metabase_admin_first_name | default('Admin') }}"
        last_name: "{{ metabase_admin_last_name | default('devBoxNOS') }}"
        site_name: "devBoxNOS BI"
      prefs:
        site_name: "devBoxNOS BI"
        site_locale: "en"
        allow_tracking: false
    status_code: [200]
    timeout: 30
  register: _mb_setup
  when:
    - _mb_ready.status | default(0) == 200
    - _mb_setup_token | default('') | length > 0
  changed_when: _mb_setup.status | default(0) == 200
  failed_when: false
