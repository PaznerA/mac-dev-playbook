---
# ==============================================================================
# VAULTWARDEN – Bitwarden-kompatibilní personal password vault (Docker)
# ==============================================================================

- name: "[Vaultwarden] Ensure data directory"
  ansible.builtin.file:
    path: "{{ vaultwarden_data_dir | default(ansible_facts['env']['HOME'] + '/vaultwarden') }}"
    state: directory
    mode: '0755'

- name: "[Vaultwarden] Print info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       Vaultwarden připraven (spouští se přes IIAB stack)
      ══════════════════════════════════════════════════════
       URL:     https://{{ vaultwarden_domain | default('pass.dev.local') }}
       Admin:   https://{{ vaultwarden_domain | default('pass.dev.local') }}/admin
       Token:   {{ vaultwarden_admin_token }}
       Data:    {{ vaultwarden_data_dir | default(ansible_facts['env']['HOME'] + '/vaultwarden') }}
      ══════════════════════════════════════════════════════
