---
# ==============================================================================
# FREESCOUT POST-START – vytvoreni admin uzivatele pres Artisan CLI
# FreeScout nema REST API pro onboarding – pouziva Laravel Artisan.
# ==============================================================================

- name: "[FreeScout Post] Wait for service"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ freescout_port | default(8090) }}/"
    method: GET
    timeout: 5
    status_code: [200, 302, 500]
  register: _fs_ready
  until: _fs_ready.status | default(0) in [200, 302, 500]
  retries: 12
  delay: 10
  failed_when: false

- name: "[FreeScout Post] Check if admin user exists"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p b2b
    exec -T freescout
    php artisan tinker --execute="echo App\User::where('email','{{ freescout_admin_email | default('admin@dev.local') }}')->count();"
    2>/dev/null || echo "0"
  register: _fs_user_check
  changed_when: false
  failed_when: false
  check_mode: false
  when: _fs_ready.status | default(0) in [200, 302, 500]

- name: "[FreeScout Post] Create admin user via Artisan"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p b2b
    exec -T freescout
    php artisan freescout:create-user
    --role=admin
    --firstName="{{ freescout_admin_first_name | default('Admin') }}"
    --lastName="{{ freescout_admin_last_name | default('devBoxNOS') }}"
    --email="{{ freescout_admin_email | default('admin@dev.local') }}"
    --password="{{ freescout_admin_password | default(global_password_prefix + '_pw_freescout') }}"
    2>&1 || true
  when:
    - _fs_ready.status | default(0) in [200, 302, 500]
    - (_fs_user_check.stdout | default('0') | trim) == '0'
  changed_when: true
  failed_when: false
  check_mode: false
