---
# ==============================================================================
# N8N POST-START – auto-registrace owner uzivatele
# n8n od v1.0 pouziva /api/v1/owner/setup pro prvni ucet (owner = admin)
# ==============================================================================

- name: "[n8n Post] Wait for API"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ n8n_port | default(5678) }}/healthz"
    method: GET
    timeout: 5
    status_code: [200]
  register: _n8n_ready
  until: _n8n_ready.status | default(0) == 200
  retries: 12
  delay: 10
  failed_when: false

- name: "[n8n Post] Check if owner already exists"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ n8n_port | default(5678) }}/api/v1/owner"
    method: GET
    timeout: 10
    status_code: [200, 401, 403, 404]
  register: _n8n_owner_check
  failed_when: false
  when: _n8n_ready.status | default(0) == 200

- name: "[n8n Post] Setup owner account"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ n8n_port | default(5678) }}/api/v1/owner/setup"
    method: POST
    body_format: json
    body:
      email: "{{ n8n_admin_email | default('admin@dev.local') }}"
      password: "{{ n8n_admin_password | default('changeme_pw_n8n') }}"
      firstName: "{{ n8n_admin_firstname | default('Admin') }}"
      lastName: "{{ n8n_admin_lastname | default('devBoxNOS') }}"
    status_code: [200, 201]
    timeout: 10
  register: _n8n_setup
  when:
    - _n8n_ready.status | default(0) == 200
    - _n8n_owner_check.status | default(0) != 200
  changed_when: _n8n_setup.status | default(0) in [200, 201]
  failed_when: false
