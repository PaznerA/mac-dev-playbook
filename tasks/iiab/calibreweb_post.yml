---
# ==============================================================================
# CALIBRE-WEB POST-START – zmena vychoziho admin hesla
# Default creds: admin / admin123. Zmeni heslo na global_password_prefix.
# ==============================================================================

- name: "[Calibre-Web Post] Wait for API"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ calibreweb_port | default(8083) }}/"
    method: GET
    timeout: 5
    status_code: [200, 302]
  register: _cw_ready
  until: _cw_ready.status | default(0) in [200, 302]
  retries: 12
  delay: 10
  failed_when: false

- name: "[Calibre-Web Post] Login with default credentials"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ calibreweb_port | default(8083) }}/login"
    method: POST
    body_format: form-urlencoded
    body:
      username: "admin"
      password: "admin123"
      next: "/"
    status_code: [200, 302]
    follow_redirects: none
    timeout: 10
  register: _cw_login_default
  failed_when: false
  when: _cw_ready.status | default(0) in [200, 302]

- name: "[Calibre-Web Post] Login with target password (already changed)"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ calibreweb_port | default(8083) }}/login"
    method: POST
    body_format: form-urlencoded
    body:
      username: "admin"
      password: "{{ calibreweb_admin_password | default(global_password_prefix + '_pw_calibreweb') }}"
      next: "/"
    status_code: [200, 302]
    follow_redirects: none
    timeout: 10
  register: _cw_login_target
  failed_when: false
  when:
    - _cw_ready.status | default(0) in [200, 302]
    - _cw_login_default.status | default(0) == 302

- name: "[Calibre-Web Post] Password already changed – skip"
  ansible.builtin.debug:
    msg: "Calibre-Web admin password already updated"
  when:
    - _cw_login_default.status | default(0) != 302
    - _cw_login_target.status | default(0) == 302
