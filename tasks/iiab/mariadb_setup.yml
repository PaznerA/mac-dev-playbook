---
# ==============================================================================
# MARIADB – post-start nastavení (spouštěno PO startu docker compose stacku)
# Vytváří databáze a uživatele definované v mariadb_databases / mariadb_users
# ==============================================================================

- name: "[MariaDB] Wait for MariaDB container to be running"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      {{ homebrew_prefix }}/bin/docker compose -f {{ iiab_compose_dir }}/docker-compose.yml ps --format json mariadb 2>/dev/null | grep -q '"running"'
    executable: /bin/bash
  register: mariadb_container
  until: mariadb_container.rc == 0
  retries: 30
  delay: 5
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: "[MariaDB] Wait for port to be ready"
  ansible.builtin.wait_for:
    port: "{{ mariadb_port | default(3306) }}"
    host: "127.0.0.1"
    timeout: 120
  when:
    - not ansible_check_mode
    - mariadb_container.rc | default(1) == 0

- name: "[MariaDB] Remove test database"
  community.mysql.mysql_db:
    login_host: "127.0.0.1"
    login_port: "{{ mariadb_port | default(3306) }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    name: test
    state: absent
  failed_when: false

- name: "[MariaDB] Check connection to MariaDB"
  community.mysql.mysql_info:
    login_host: "127.0.0.1"
    login_port: "{{ mariadb_port | default(3306) }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
  register: mariadb_conn
  ignore_errors: true  # noqa: ignore-errors – potřebujeme registrovat failed stav

- name: "[MariaDB] Create databases"
  community.mysql.mysql_db:
    login_host: "127.0.0.1"
    login_port: "{{ mariadb_port | default(3306) }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    name: "{{ item.name }}"
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
    state: present
  loop: "{{ mariadb_databases | default([]) }}"
  no_log: true
  when: mariadb_conn is not failed

# host: '%' – PHP-FPM a další klienti se připojují přes Docker port-forward;
# uvnitř MariaDB kontejneru to nepřijde jako 127.0.0.1 ale jako gateway IP
- name: "[MariaDB] Create database users"
  community.mysql.mysql_user:
    login_host: "127.0.0.1"
    login_port: "{{ mariadb_port | default(3306) }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    priv: "{{ item.priv }}"
    host: "{{ item.host | default('%') }}"
    state: present
  loop: "{{ mariadb_users | default([]) }}"
  no_log: true
  when: mariadb_conn is not failed
