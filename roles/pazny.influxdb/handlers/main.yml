---
# pazny.influxdb — handlers
# Play-level "Restart influxdb" v main.yml má přednost; tento zůstává pro
# samostatné použití role mimo devBoxNOS playbook.

- name: Restart influxdb
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/observability/docker-compose.yml" -p observability
    restart influxdb
  failed_when: false
