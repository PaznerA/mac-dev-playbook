---
# ==============================================================================
# pazny.influxdb/tasks/main.yml
#
# Voláno z tasks/stacks/core-up.yml PŘED `docker compose -p observability up`:
# vytvoří data + config dir, vyrenderuje compose override fragment do
# {{ stacks_dir }}/observability/overrides/influxdb.yml, který pak core-up.yml
# sesbírá přes `find` a přidá jako dodatečný -f flag.
# ==============================================================================

- name: "[pazny.influxdb] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ influxdb_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.influxdb] Ensure config directory exists"
  ansible.builtin.file:
    path: "{{ influxdb_config_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.influxdb] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/observability/overrides/influxdb.yml"
    mode: '0600'
  notify: Restart influxdb
