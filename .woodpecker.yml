---
when:
  branch: dev

steps:
  lint:
    image: cytopia/yamllint
    commands:
      - yamllint -c .yamllint .

  syntax-check:
    image: willhallonline/ansible:latest
    commands:
      - ansible-playbook main.yml --syntax-check

  notify:
    image: alpine/curl
    commands:
      - echo "Pipeline passed for ${CI_COMMIT_SHA}"
    when:
      event: push
      branch: dev
