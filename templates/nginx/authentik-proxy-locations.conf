# ==============================================================================
# Authentik Proxy Outpost — location bloky (include v server {} kontextu)
# Přidej do KAŽDÉHO vhostu, který používá authentik-proxy-auth.conf
# ==============================================================================

# Outpost endpoint (embedded outpost na Authentik serveru)
location /outpost.goauthentik.io {
    proxy_pass         http://127.0.0.1:{{ authentik_port | default(9003) }}/outpost.goauthentik.io;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Original-URL    $scheme://$http_host$request_uri;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Content-Length     "";
    proxy_pass_request_body off;
}

# Redirect na Authentik login pokud auth_request vrátí 401
location @goauthentik_proxy_signin {
    internal;
    add_header Set-Cookie $auth_cookie;
    return 302 /outpost.goauthentik.io/start?rd=$request_uri;
}
