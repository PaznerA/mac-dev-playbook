---
# credentials.yml – HESLA A TOKENY
# ─────────────────────────────────────────────────────────────────────────────
# Tento soubor je v .gitignore – NIKDY ho necommituj!
#
# Použití:
#   cp credentials.example.yml credentials.yml
#   nano credentials.yml
#
# POKUD CREDENTIALS.YML NEEXISTUJE, playbook použije výchozí hesla:
#   Formát: [global_password_prefix]_pw_[služba]
#   Default prefix: "changeme" → hesla budou: changeme_pw_mariadb, changeme_pw_grafana, ...
#
# Pro vlastní prefix (jedno heslo pro vše):
#   global_password_prefix: "mojefirma2026"
#   → všechna hesla: mojefirma2026_pw_mariadb, mojefirma2026_pw_grafana, ...
#
# Pro individuální hesla přepiš jednotlivé řádky níže.
# Admin username je vždy "admin" (kromě Gitea = systémový uživatel).
# ─────────────────────────────────────────────────────────────────────────────

# ── Globální prefix (přepíše všechna "changeme" hesla najednou) ──────────────
# global_password_prefix: "mojefirma2026"

# ── Systémové služby ─────────────────────────────────────────────────────────
# vnc_password: "moje_vnc_heslo"       # VNC/Screen Sharing (default: changeme_pw_vnc)

# ── MariaDB ──────────────────────────────────────────────────────────────────
# mariadb_root_password: "silne_heslo"
# Login: root / [prefix]_pw_mariadb

# ── PostgreSQL ───────────────────────────────────────────────────────────────
# postgresql_root_password: "silne_heslo"
# Login: postgres / [prefix]_pw_postgresql

# ── Grafana ──────────────────────────────────────────────────────────────────
# grafana_admin_password: "silne_heslo"
# Login: admin / [prefix]_pw_grafana

# ── WordPress ────────────────────────────────────────────────────────────────
# wordpress_db_password: "silne_heslo"
# wordpress_admin_password: "silne_heslo"
# Login: admin / [prefix]_pw_wordpress_admin

# ── Nextcloud ────────────────────────────────────────────────────────────────
# nextcloud_db_password: "silne_heslo"
# nextcloud_admin_password: "silne_heslo"
# Login: admin / [prefix]_pw_nextcloud_admin

# ── Gitea ────────────────────────────────────────────────────────────────────
# gitea_admin_password: "silne_heslo"
# gitea_secret_key: "openssl rand -hex 32"
# Login: (systémový uživatel) / [prefix]_pw_gitea

# ── Open WebUI ───────────────────────────────────────────────────────────────
# openwebui_secret_key: "openssl rand -hex 32"
# openwebui_admin_password: "silne_heslo"
# Login: admin@dev.local / [prefix]_pw_openwebui_admin

# ── Portainer ────────────────────────────────────────────────────────────────
# portainer_admin_password: "silne_heslo"
# Login: admin / [prefix]_pw_portainer

# ── Uptime Kuma ──────────────────────────────────────────────────────────────
# uptime_kuma_admin_password: "silne_heslo"
# Login: admin / [prefix]_pw_uptime_kuma

# ── RustFS (S3) ──────────────────────────────────────────────────────────────
# rustfs_access_key: "muj_access_key"
# rustfs_secret_key: "muj_secret_key"
# S3 API: [prefix]_pw_rustfs_access / [prefix]_pw_rustfs_secret

# ── ERPNext ──────────────────────────────────────────────────────────────────
# erpnext_admin_password: "silne_heslo"
# Login: Administrator / [prefix]_pw_erpnext

# ── FreeScout ────────────────────────────────────────────────────────────────
# freescout_db_password: "silne_heslo"
# freescout_admin_password: "silne_heslo"
# Login: admin@dev.local / [prefix]_pw_freescout

# ── Mattermost ───────────────────────────────────────────────────────────────
# mattermost_db_password: "silne_heslo"
# Login: první registrace = admin

# ── Outline ──────────────────────────────────────────────────────────────────
# outline_db_password: "silne_heslo"
# outline_secret_key: "openssl rand -hex 32"
# outline_utils_secret: "openssl rand -hex 32"
# Login: vyžaduje SSO provider (Bluesky PDS, OIDC)

# ── FreePBX ──────────────────────────────────────────────────────────────────
# freepbx_db_password: "silne_heslo"
# Login: admin / (wizard)

# ── Metabase ─────────────────────────────────────────────────────────────────
# metabase_db_password: "silne_heslo"
# Login: první registrace = admin

# ── Superset ─────────────────────────────────────────────────────────────────
# superset_db_password: "silne_heslo"
# superset_secret_key: "openssl rand -hex 32"
# Login: admin / admin (docker exec superset init)

# ── Bluesky PDS ──────────────────────────────────────────────────────────────
# bluesky_pds_admin_password: "silne_heslo"
# bluesky_pds_jwt_secret: "openssl rand -hex 32"
# bluesky_pds_rotation_key: "openssl rand -hex 32"
# Admin: pdsadmin CLI

# ── Woodpecker CI ────────────────────────────────────────────────────────────
# woodpecker_agent_secret: "openssl rand -hex 32"
# woodpecker_gitea_client: ""   # VYPLŇ po vytvoření OAuth2 app v Gitea
# woodpecker_gitea_secret: ""   # VYPLŇ po vytvoření OAuth2 app v Gitea

# ── Calibre-Web ──────────────────────────────────────────────────────────────
# Login: admin / admin123 (linuxserver default, změnit ručně)

# ── Jellyfin ─────────────────────────────────────────────────────────────────
# Login: setup wizard (https://media.dev.local)

# ── Home Assistant ───────────────────────────────────────────────────────────
# Login: onboarding wizard (https://home.dev.local)

# ── N8N ──────────────────────────────────────────────────────────────────────
# Login: první registrace = owner (https://n8n.dev.local)
# Ollama: Settings → Credentials → Base URL: http://host.docker.internal:11434

# ── Tailscale ────────────────────────────────────────────────────────────────
# tailscale_auth_key: ""   # Pre-auth key z https://login.tailscale.com/admin/settings/keys
